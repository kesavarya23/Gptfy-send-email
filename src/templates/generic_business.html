<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2196F3; color: white; padding: 20px; border-radius: 5px 5px 0 0; }
        .content { background-color: #f4f6f9; padding: 20px; border: 1px solid #ddd; }
        .detail-row { margin: 10px 0; padding: 10px; background-color: white; border-left: 3px solid #2196F3; }
        .label { font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>{{ title }}</h2>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>{{ message }}</p>
            <div class="detail-row">
                <span class="label">From:</span> {{ sender_name }}
            </div>
            <p style="margin-top: 20px;">Please let me know if you have any questions.</p>
        </div>
    </div>
</body>
</html>
